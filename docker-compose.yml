services:
  db:
    image: postgres:16-alpine
    container_name: cva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cva
      POSTGRES_PASSWORD: cva
      POSTGRES_DB: cva_gestao
      TZ: America/Sao_Paulo
    ports:
      # 5433 no host para não conflitar com um Postgres já instalado.
      - '5433:5432'
    volumes:
      - cva-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cva -d cva_gestao']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cva-pgdata:
